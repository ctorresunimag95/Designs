info:
  name: CreateM2MToken
  type: http
  seq: 1

http:
  method: POST
  url: "{{authUrl}}/realms/aspire-guide/protocol/openid-connect/token"
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: client_credentials
      - name: client_id
        value: sample-api-m2m
      - name: client_secret
        value: local-dev-secret
      - name: scope
        value: api:read
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
