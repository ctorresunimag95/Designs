info:
  name: CreateUserToken
  type: http
  seq: 1

http:
  method: POST
  url: "{{authUrl}}/realms/aspire-guide/protocol/openid-connect/token"
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: password
      - name: client_id
        value: sample-api-ui
      - name: username
        value: dev-user
      - name: password
        value: Dev@1234
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        let data = res.getBody();
        bru.setEnvVar("access_token", data.access_token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
